name: Vercel Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy and Sync Aliases
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-production
      cancel-in-progress: false

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.6"

      - name: Verify Vercel credentials
        run: |
          test -n "${VERCEL_TOKEN}" || (echo "Missing VERCEL_TOKEN secret." && exit 1)
          test -n "${VERCEL_ORG_ID}" || (echo "Missing VERCEL_ORG_ID secret." && exit 1)
          test -n "${VERCEL_PROJECT_ID}" || (echo "Missing VERCEL_PROJECT_ID secret." && exit 1)

      - name: Install Vercel CLI
        run: npm install --global vercel@53.1.0

      - name: Pull Vercel project configuration
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel output
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy production
        id: deploy
        run: |
          set -euo pipefail
          deployment_json="$(vercel deploy --prebuilt --prod --yes --format json --token="${VERCEL_TOKEN}")"
          deployment_url="$(node -e 'const payload = JSON.parse(process.argv[1]); console.log(payload.url || payload.deployment?.url || "");' "${deployment_json}")"

          if [ -z "${deployment_url}" ]; then
            echo "Could not parse deployment URL from Vercel response."
            echo "${deployment_json}"
            exit 1
          fi

          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"

      - name: Sync production aliases
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" absensi-gps-barcode.vercel.app --token="${VERCEL_TOKEN}"
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" paspapan.vercel.app --token="${VERCEL_TOKEN}"
