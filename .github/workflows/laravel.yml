name: Laravel Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: gd, intl, zip, pdo_sqlite

    - uses: actions/checkout@v4

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate --force

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Prepare SQLite database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Restore bun install cache
      id: cache-bun-install
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: '1.2.21'

    - name: Install Bun dependencies and Build Assets
      run: bun install --frozen-lockfile && bun run build

    - name: Delete node_modules
      run: rm -rf node_modules

    - name: Execute tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ':memory:'
        CACHE_STORE: array
        QUEUE_CONNECTION: sync
        SESSION_DRIVER: array
        MAIL_MAILER: array
      run: php artisan test --without-tty

  deploy:
    name: 🚀 Deploy to FTP
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, bcmath, intl, gd, zip

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: '1.2.21'

    - name: Build Assets
      run: |
        bun install --frozen-lockfile
        bun run build
        rm -rf node_modules

    - name: 📂 Sync Files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/.editorconfig
          **/.env.example
          **/phpunit.xml
          **/README.md
          **/.github/**
