// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.6.1'
        classpath 'com.google.gms:google-services:4.4.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0"

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy {
            force 'androidx.browser:browser:1.8.0'
            force "androidx.activity:activity:${rootProject.ext.androidxActivityVersion}"
            force "androidx.activity:activity-ktx:${rootProject.ext.androidxActivityVersion}"
            force "androidx.core:core:${rootProject.ext.androidxCoreVersion}"
            force "androidx.core:core-ktx:${rootProject.ext.androidxCoreVersion}"
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
